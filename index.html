<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendências - Casa Romeu</title>
    <style>
        :root {
            --azul:   #12273A;
            --azul2:  #1a3550;
            --ambar:  #CD7B1E;
            --ambar2: #A74F00;
            --cinza:  #F2F2F2;
            --bg:     #f0eeea;
            --branco: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: #333;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: var(--azul);
            display: flex;
            align-items: center;
            padding: 0 24px;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .header img {
            height: 52px;
            width: auto;
            flex-shrink: 0;
        }
        .header-title {
            margin-left: 20px;
            color: #ffffff;
        }
        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .header-title p {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        /* ── CONTENT ── */
        .container {
            max-width: 1100px;
            padding: 24px;
        }

        /* ── STATS ── */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--branco);
            padding: 16px 20px;
            border-radius: 8px;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .stat-number {
            font-size: 30px;
            font-weight: 700;
            color: var(--azul);
        }
        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-top: 2px;
        }

        /* ── SECTION ── */
        .section {
            background: var(--branco);
            padding: 28px 30px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--azul);
            margin-bottom: 20px;
        }

        /* ── PENDÊNCIA ITEM ── */
        .pendencia-item {
            border-left: 4px solid #ddd;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: #fafaf8;
            border-radius: 4px;
        }
        .pendencia-item.crucial    { border-left-color: #e74c3c; }
        .pendencia-item.importante { border-left-color: var(--ambar); }
        .pendencia-item.normal     { border-left-color: #27ae60; }

        .pendencia-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            color: #222;
        }
        .pendencia-obs {
            color: #777;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .priority-crucial   { background: #fff0f0; color: #c0392b; }
        .priority-importante { background: #fef9e2; color: #9a7a00; }
        .priority-normal    { background: #eaf5ee; color: #2e7a4a; }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: var(--branco);
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        textarea:focus,
        select:focus { border-color: var(--ambar); }
        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            background: var(--azul);
            color: white;
            padding: 11px 28px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover   { background: var(--ambar2); }
        button:disabled { background: #aaa; cursor: default; }

        /* ── LOADING ── */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 13px;
        }
        .spinner {
            border: 2px solid #eee;
            border-top: 2px solid var(--ambar);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MESSAGES ── */
        .message {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        .message.success {
            background: #eaf5ee;
            color: #2d7a4a;
            border: 1px solid #b2dfc0;
        }
        .message.error {
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #fcc;
        }

        /* ── FILTERS ── */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters select {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            background: var(--branco);
            color: #333;
            outline: none;
            flex: 1;
            min-width: 160px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .filters select:focus { border-color: var(--ambar); }
        .btn-clear {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
            margin-top: 0;
            transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--ambar); color: var(--ambar); background: none; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .section { padding: 20px; }
            .stats { flex-direction: column; }
            .stat-card { min-width: 100%; }
        }
        @media (max-width: 600px) {
            .header { padding: 0 14px; height: 60px; }
            .header img { height: 38px; }
            .header-title h1 { font-size: 15px; }
            .header-title p { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="https://rod-010.github.io/portal-casa-romeu/Logo_Romeu_R_Invertido.png" alt="Casa Romeu">
    <div class="header-title">
        <h1>Painel de Pendências</h1>
        <p>Casa Romeu — Gestão de Tarefas</p>
    </div>
</div>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="total-count">-</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="crucial-count">-</div>
            <div class="stat-label">Crucial</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="importante-count">-</div>
            <div class="stat-label">Importante</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="normal-count">-</div>
            <div class="stat-label">Normal</div>
        </div>
    </div>

    <div class="section">
        <h2>Pendências Ativas</h2>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Carregando dados...
        </div>
        <div class="filters" id="filtros-wrap" style="display:none">
            <select id="sel-prioridade" onchange="aplicarFiltro()">
                <option value="">Todas as prioridades</option>
                <option value="crucial">CRUCIAL</option>
                <option value="importante">IMPORTANTE</option>
                <option value="normal">NORMAL</option>
            </select>
            <button class="btn-clear" onclick="limparFiltro()">Limpar filtro</button>
        </div>
        <div id="pendencias-list"></div>
    </div>

    <div class="section">
        <h2>Nova Pendência</h2>
        <div id="form-message" class="message"></div>
        <form id="pendencia-form">
            <div class="form-group">
                <label for="pendencia">Pendência *</label>
                <input type="text" id="pendencia" name="pendencia" required>
            </div>
            <div class="form-group">
                <label for="observacao">Observação</label>
                <textarea id="observacao" name="observacao"></textarea>
            </div>
            <div class="form-group">
                <label for="prioridade">Prioridade *</label>
                <select id="prioridade" name="prioridade" required>
                    <option value="">Selecione...</option>
                    <option value="CRUCIAL">CRUCIAL</option>
                    <option value="IMPORTANTE">IMPORTANTE</option>
                    <option value="NORMAL">NORMAL</option>
                </select>
            </div>
            <button type="submit" id="submit-btn">Adicionar Pendência</button>
        </form>
    </div>

</div>

<script>
    // CONFIGURAÇÃO - URL DO WEB APP
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-0VSknXc-TKTZ_0x3ZnTpFEy9_fm30ehkc8bBBkP-bnw7pwICjQgiehErKudTPF1u/exec';
    const SHEET_ID = '1C0bPgXV24nSfDPkwAeHIYU6ml-l36DcU_78FLQuZUtE';

    // Carregar dados ao iniciar
    document.addEventListener('DOMContentLoaded', loadPendencias);

    // Submit do formulário
    document.getElementById('pendencia-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submit-btn');
        const message = document.getElementById('form-message');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Enviando...';
        message.style.display = 'none';

        const formData = {
            action: 'add',
            pendencia: document.getElementById('pendencia').value,
            observacao: document.getElementById('observacao').value,
            prioridade: document.getElementById('prioridade').value
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            // Como está em no-cors, assumimos sucesso
            message.className = 'message success';
            message.textContent = '✓ Pendência adicionada com sucesso!';
            message.style.display = 'block';

            // Limpar form
            document.getElementById('pendencia-form').reset();

            // Recarregar lista após 1 segundo
            setTimeout(loadPendencias, 1000);

        } catch (error) {
            message.className = 'message error';
            message.textContent = '✗ Erro ao adicionar pendência. Tente novamente.';
            message.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Adicionar Pendência';
        }
    });

    async function loadPendencias() {
        const loading = document.getElementById('loading');
        const list = document.getElementById('pendencias-list');

        loading.style.display = 'block';
        list.innerHTML = '';

        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Pendencias`;
            const response = await fetch(url);
            const text = await response.text();

            // Parse do JSON do Google Sheets
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            if (!rows || rows.length === 0) {
                list.innerHTML = '<p style="color: #bbb; font-size: 13px;">Nenhuma pendência encontrada.</p>';
                return;
            }

            // Contadores
            let crucial = 0, importante = 0, normal = 0;

            // Renderizar pendências (ignorar header)
            rows.forEach(row => {
                const pendencia = row.c[0]?.v || '';
                const observacao = row.c[1]?.v || '';
                const prioridade = row.c[2]?.v || '';
                const resolvido = row.c[3]?.v || '';

                // Ignorar se resolvido ou se for header
                if (resolvido === 'SIM' || pendencia === 'Pendencia' || !pendencia) return;

                // Contar prioridades
                if (prioridade.includes('CRUCIAL')) crucial++;
                else if (prioridade.includes('IMPORTANTE')) importante++;
                else if (prioridade.includes('NORMAL')) normal++;

                const priorityClass = prioridade.includes('CRUCIAL') ? 'crucial' :
                                     prioridade.includes('IMPORTANTE') ? 'importante' : 'normal';

                const priorityBadge = prioridade.includes('CRUCIAL') ? 'priority-crucial' :
                                     prioridade.includes('IMPORTANTE') ? 'priority-importante' : 'priority-normal';

                const item = `
                    <div class="pendencia-item ${priorityClass}" data-prioridade="${priorityClass}">
                        <div class="pendencia-title">${pendencia}</div>
                        ${observacao ? `<div class="pendencia-obs">${observacao}</div>` : ''}
                        <span class="badge ${priorityBadge}">${prioridade.split('...')[0]}</span>
                    </div>
                `;
                list.innerHTML += item;
            });

            // Mostrar filtros se houver itens
            document.getElementById('filtros-wrap').style.display = (crucial + importante + normal) > 0 ? 'flex' : 'none';

            // Atualizar stats
            document.getElementById('total-count').textContent = crucial + importante + normal;
            document.getElementById('crucial-count').textContent = crucial;
            document.getElementById('importante-count').textContent = importante;
            document.getElementById('normal-count').textContent = normal;

        } catch (error) {
            console.error('Erro ao carregar pendências:', error);
            list.innerHTML = '<p style="color: #c0392b; font-size: 13px;">Erro ao carregar dados. Verifique a planilha.</p>';
        } finally {
            loading.style.display = 'none';
        }
    }

    function aplicarFiltro() {
        const valor = document.getElementById('sel-prioridade').value;
        document.querySelectorAll('#pendencias-list .pendencia-item').forEach(el => {
            el.style.display = (!valor || el.dataset.prioridade === valor) ? '' : 'none';
        });
    }

    function limparFiltro() {
        document.getElementById('sel-prioridade').value = '';
        aplicarFiltro();
    }

    // Atualizar a cada 30 segundos
    setInterval(loadPendencias, 30000);
</script>
</body>
</html>
